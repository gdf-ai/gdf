AWSTemplateFormatVersion: "2010-09-09"
Description: GDF Hub Server - single EC2 instance with Caddy auto-HTTPS

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH access

  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Route 53 hosted zone ID for gdf.ai

  GDFToken:
    Type: String
    NoEcho: true
    Description: Auth token for the GDF hub (use `openssl rand -hex 32`)

  AdminCIDR:
    Type: String
    Description: CIDR for SSH access (e.g. 203.0.113.5/32)
    AllowedPattern: '(\d{1,3}\.){3}\d{1,3}/\d{1,2}'

  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Amazon Linux 2023 latest AMI

Resources:
  HubSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: GDF Hub - SSH + HTTP + HTTPS
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AdminCIDR
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: gdf-hub-sg

  HubEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: gdf-hub-eip

  HubInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      ImageId: !Ref AmiId
      SecurityGroupIds:
        - !GetAtt HubSecurityGroup.GroupId
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
      Tags:
        - Key: Name
          Value: gdf-hub
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          exec > /var/log/gdf-setup.log 2>&1

          # Swap (t3.micro has only 1GB RAM — torch needs more)
          fallocate -l 2G /swapfile
          chmod 600 /swapfile && mkswap /swapfile && swapon /swapfile

          # System packages
          dnf update -y
          dnf install -y python3.11 python3.11-pip git

          # Install CPU-only torch (saves disk), then GDF
          TMPDIR=/opt/tmp mkdir -p /opt/tmp
          TMPDIR=/opt/tmp python3.11 -m pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu
          TMPDIR=/opt/tmp python3.11 -m pip install --no-cache-dir numpy
          TMPDIR=/opt/tmp python3.11 -m pip install --no-cache-dir git+https://github.com/gdf-ai/gdf.git

          # Create gdf user and working directory
          useradd -r -s /sbin/nologin gdf
          mkdir -p /opt/gdf /home/gdf
          chown gdf:gdf /opt/gdf /home/gdf

          # Initialize model
          cd /opt/gdf
          sudo -u gdf HOME=/home/gdf gdf init --name hub_model.pt

          # Write environment file
          cat > /opt/gdf/.env <<ENVEOF
          GDF_TOKEN=${GDFToken}
          ENVEOF
          chmod 600 /opt/gdf/.env
          chown gdf:gdf /opt/gdf/.env

          # Install Caddy
          dnf install -y dnf-plugins-core
          dnf copr enable -y @caddy/caddy epel-9-x86_64 || true
          dnf install -y caddy || {
            # Fallback: install from GitHub releases
            curl -sL "https://github.com/caddyserver/caddy/releases/latest/download/caddy_2.9.1_linux_amd64.tar.gz" \
              | tar xz -C /usr/local/bin caddy
            chmod +x /usr/local/bin/caddy
          }

          # Caddyfile
          mkdir -p /etc/caddy /var/log/caddy
          chown caddy:caddy /var/log/caddy
          cp /opt/gdf/infra/Caddyfile /etc/caddy/Caddyfile 2>/dev/null || \
          cat > /etc/caddy/Caddyfile <<'CADDYEOF'
          hub.gdf.ai {
              reverse_proxy localhost:7677
              log {
                  output file /var/log/caddy/access.log
              }
          }
          CADDYEOF

          # systemd service for GDF hub
          cat > /etc/systemd/system/gdf-hub.service <<'SVCEOF'
          [Unit]
          Description=GDF Hub Server
          After=network.target

          [Service]
          Type=simple
          User=gdf
          WorkingDirectory=/opt/gdf
          EnvironmentFile=/opt/gdf/.env
          ExecStart=/usr/local/bin/gdf hub --model /opt/gdf/hub_model.pt --token $GDF_TOKEN
          Environment=HOME=/home/gdf
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          SVCEOF

          # Enable and start services
          systemctl daemon-reload
          systemctl enable --now caddy
          systemctl enable --now gdf-hub

  HubEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref HubInstance
      AllocationId: !GetAtt HubEIP.AllocationId

  HubDNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: hub.gdf.ai
      Type: A
      TTL: "300"
      ResourceRecords:
        - !Ref HubEIP

Outputs:
  PublicIP:
    Description: Hub Elastic IP
    Value: !Ref HubEIP

  HubURL:
    Description: Hub URL
    Value: https://hub.gdf.ai

  SSHCommand:
    Description: SSH into the hub
    Value: !Sub "ssh -i ${KeyPairName}.pem ec2-user@${HubEIP}"
